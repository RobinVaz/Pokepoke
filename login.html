<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Ouverture de Booster Pokémon</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Connexion</h1>
    </header>

    <main>
        <section id="login-section">
            <h2>Veuillez vous connecter</h2>
            <form id="login-form">
                <input type="text" id="username" placeholder="Nom d'utilisateur" required>
                <input type="password" id="password" placeholder="Mot de passe" required>
                <input type="email" id="email" placeholder="Adresse e-mail (pour récupération de mot de passe)" required>
                <button type="submit">Se connecter</button>
            </form>
            <button id="forgot-password-button">Mot de passe oublié ?</button>
        </section>
    </main>

    <script>
        document.getElementById('login-form').addEventListener('submit', function(event) {
            event.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const email = document.getElementById('email').value.trim();
            if (username && password && email) {
                let users = JSON.parse(localStorage.getItem('users')) || [];
                let user = users.find(user => user.username === username || user.email === email);

                if (user) {
                    // Vérifier le mot de passe
                    if (user.username === username && user.password === password) {
                        localStorage.setItem('currentUser', username);
                        window.location.href = 'index.html';
                    } else if (user.email === email) {
                        alert('Cette adresse e-mail est déjà utilisée.');
                    } else {
                        alert('Nom d\'utilisateur ou mot de passe incorrect.');
                    }
                } else {
                    // Enregistrer le nouvel utilisateur
                    if (users.some(user => user.email === email)) {
                        alert('Cette adresse e-mail est déjà utilisée.');
                    } else {
                        users.push({ username, password, email });
                        localStorage.setItem('users', JSON.stringify(users));
                        localStorage.setItem('currentUser', username);
                        window.location.href = 'index.html';
                    }
                }
            }
        });

        document.getElementById('forgot-password-button').addEventListener('click', function() {
            const email = prompt('Veuillez entrer votre adresse e-mail :');
            if (email) {
                fetch('http://localhost:3000/send-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email })
                })
                .then(response => response.text())
                .then(data => alert(data))
                .catch(error => console.error('Erreur:', error));
            }
        });
    </script>
</body>
</html>
